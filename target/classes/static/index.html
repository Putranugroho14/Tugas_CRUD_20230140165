<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Manajemen KTP</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Load jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Aplikasi Pendataan KTP</h1>
        <p>Sistem Informasi Data Kependudukan</p>
    </div>

    <!-- Notification box -->
    <div id="notification" class="hidden"></div>

    <div class="content-wrapper">
        <!-- Form Section -->
        <div class="form-section card">
            <h2>Form Data KTP</h2>
            <form id="ktpForm">
                <input type="hidden" id="ktpId" name="ktpId">
                
                <div class="form-group">
                    <label for="nomorKtp">Nomor KTP *</label>
                    <input type="text" id="nomorKtp" name="nomorKtp" required placeholder="Masukkan 16 digit Nomor KTP">
                </div>

                <div class="form-group">
                    <label for="namaLengkap">Nama Lengkap *</label>
                    <input type="text" id="namaLengkap" name="namaLengkap" required placeholder="Sesuai dengan KTP">
                </div>

                <div class="form-group">
                    <label for="alamat">Alamat *</label>
                    <textarea id="alamat" name="alamat" required placeholder="Alamat Lengkap"></textarea>
                </div>

                <div class="form-group">
                    <label for="tanggalLahir">Tanggal Lahir *</label>
                    <input type="date" id="tanggalLahir" name="tanggalLahir" required>
                </div>

                <div class="form-group">
                    <label for="jenisKelamin">Jenis Kelamin *</label>
                    <select id="jenisKelamin" name="jenisKelamin" required>
                        <option value="">-- Pilih Jenis Kelamin --</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" id="btnSave" class="btn-primary">Simpan Data</button>
                    <button type="button" id="btnCancel" class="btn-secondary hidden">Batal</button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="table-section card">
            <h2>Daftar KTP terdaftar</h2>
            <div class="table-responsive">
                <table id="ktpTable">
                    <thead>
                        <tr>
                            <th>NO KTP</th>
                            <th>NAMA LENGKAP</th>
                            <th>JENIS KELAMIN</th>
                            <th>TANGGAL LAHIR</th>
                            <th>ALAMAT</th>
                            <th>AKSI</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be loaded via AJAX -->
                    </tbody>
                </table>
            </div>
            <div id="emptyData" class="hidden text-center">Data KTP belum tersedia.</div>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
